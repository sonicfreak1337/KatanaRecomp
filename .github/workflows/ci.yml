name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux / GCC
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Ninja installieren
        run: |
          sudo apt-get update
          sudo apt-get install --yes ninja-build

      - name: Debug konfigurieren
        run: cmake -S . -B build-debug -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Debug bauen
        run: cmake --build build-debug --parallel

      - name: Debug testen
        run: ctest --test-dir build-debug --output-on-failure

      - name: Release konfigurieren
        run: cmake -S . -B build-release -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Release bauen
        run: cmake --build build-release --parallel

      - name: Release testen
        run: ctest --test-dir build-release --output-on-failure

  windows:
    name: Windows / MSVC
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Visual-Studio-Build konfigurieren
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Debug bauen
        run: cmake --build build --config Debug --parallel

      - name: Debug testen
        run: ctest --test-dir build -C Debug --output-on-failure

      - name: Release bauen
        run: cmake --build build --config Release --parallel

      - name: Release testen
        run: ctest --test-dir build -C Release --output-on-failure